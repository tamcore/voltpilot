name: E2E

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build embedded binary
        run: go build -tags prodfrontend -ldflags "-s -w" -o bin/voltpilot ./cmd/server

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run app + e2e
        working-directory: web
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
        run: |
          # No EnBW key + a dead map URL: the SPA still serves and the e2e
          # mocks all /api routes in-browser, so the suite is fully offline.
          VOLTPILOT_LISTEN_ADDR=:8080 VOLTPILOT_ENBW_MAP_URL=http://127.0.0.1:1/none ../bin/voltpilot &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8080/api/healthz && break; sleep 1; done
          npx playwright test

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
