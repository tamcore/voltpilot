name: Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./...
      - run: go test -race ./...
      - name: Coverage gate (internal/... >= 70%)
        run: |
          go test -coverprofile=coverage.out ./internal/...
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "internal coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 70) ? 0 : 1 }'

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
