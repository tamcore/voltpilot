<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0f1c" />
		<meta
			name="description"
			content="voltpilot — get to the nearest available charger of your chosen charge point operator (CPO) in the fewest taps. Filter by availability and AC/DC, then hand off to your nav app."
		/>
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/icons/icon.svg" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/icons/icon-192.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/icons/icon-192.png" />
		<title>voltpilot</title>
		<script>
			(function () {
				try {
					var m = document.cookie.match(/(?:^|;\s*)voltpilot-theme=(auto|light|dark)/);
					var t = m && m[1];
					if (t === 'light' || t === 'dark') {
						document.documentElement.setAttribute('data-theme', t);
					}
				} catch (_) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
